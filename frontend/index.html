<!DOCTYPE html>
<html>
<head>
    <title>CHIT-CHAT MVP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            background: white;
            width: 400px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        ul {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        li {
            background: #e3f2fd;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 5px;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px;
            cursor: pointer;
        }
    </style>

</head>
<body>

<div class="chat-container">

<h1>CHIT-CHAT 💬</h1>



<ul id="messageList"></ul>

    <input type="text" id="usernameInput" placeholder="Your name">
    <br><br>
    <input type="text" id="messageInput" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>


    <script>
        const BASE_URL = "https://chit-chat-19q9.onrender.com";
        async function loadMessages() {
            const response = await fetch(`${BASE_URL}/messages`);

            const data = await response.json();

            const list = document.getElementById("messageList");
            list.innerHTML = "";

            data.forEach(msg => {
                const li = document.createElement("li");
                li.textContent = msg.username+": "+msg.text;
                list.appendChild(li);
            });
            list.scrollTop = list.scrollHeight;
        }

        async function sendMessage() {
    const username = document.getElementById("usernameInput").value;
    const text = document.getElementById("messageInput").value;

    if (!username || !text) {
        alert("Please enter username and message");
        return;
    }

    await fetch("https://chit-chat-19q9.onrender.com/messages", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, text })
    });

    document.getElementById("messageInput").value = "";
    loadMessages();
}

        loadMessages();
    </script>

</div>
</body>
</html>
